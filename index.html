<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>紹介面接予約</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css?v=1.0.3">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="index.js?v=1.0.3"></script>
</head>
<body>
  <div id="loading" class="kousintyu" style="display: none;">読み込み中...</div>

  <div id="view-calendar">
    <h1 class="title">面接予約カレンダー</h1>
    <div class="week-selector">
      <button id="btn-prev-week" class="nav-btn" disabled>前の週</button>
      <span id="current-week-label"></span>
      <button id="btn-next-week" class="nav-btn">次の週</button>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
  </div>

  <div id="view-form" style="display: none;">
    <h1 class="title">面接予約フォーム</h1>
    <div class="form-container">
      <div class="form-group readonly-group">
        <label>予約日時</label>
        <input type="text" id="input-datetime" readonly>
      </div>
      <div class="form-group readonly-group">
        <label>紹介者</label>
        <input type="text" id="input-introducer" readonly>
      </div>
      
      <div id="applicants-container">
        </div>
      <button id="btn-add-applicant" class="add-btn">＋ 応募者を追加</button>

      <div class="button-container">
        <button id="btn-back-to-calendar" class="back-btn">カレンダーに戻る</button>
        <button id="btn-go-confirm" class="submit-btn">確認画面へ</button>
      </div>
    </div>
  </div>

  <div id="view-confirm" style="display: none;">
    <h1 class="title">入力内容の確認</h1>
    <div class="confirm-container">
      <div id="confirm-details"></div>
      <div class="button-container">
        <button id="btn-back-to-form" class="back-btn">修正する</button>
        <button id="btn-submit" class="submit-btn">予約を確定する</button>
      </div>
    </div>
  </div>

</body>
</html>
